<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canteen Billing System</title>
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->

  <script src="https://kit.fontawesome.com/ec6452a2c3.js" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <!-- navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Canteen Bill</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="http://127.0.0.1:5000/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Bill</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="specialDropdown" role="button" data-bs-toggle="dropdown">
              dropdown
            </a>

            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">a</a></li>
              <li><a class="dropdown-item" href="#">b</a></li>

            </ul>
          </li>
        </ul>




        <a href="{{ url_for('add_item') }}" class="btn btn-success rounded-pill px-4 py-2 me-3 shadow">
          <i class="fa-solid fa-circle-plus"></i> Add Item
        </a>




        <form class="d-flex" role="search" action="{{ url_for('menu') }}" method="GET">
          <input class="form-control me-2" type="search" name="search" placeholder="Search items..."
            aria-label="Search">

          <button class="btn btn-outline-light" type="submit">
            🔍 Search
          </button>
        </form>
      </div>
    </div>
  </nav>

  <!-- menu -->
  <div class="container my-4">
    <div class="row">
      <div class="col-12">
        <form action="/place_order" method="POST">
          <table class="table table-bordered table-striped text-center align-middle">
            <thead class="table-light">
              <tr>
                
               
                <th scope="col">Item</th>
                <th scope="col">Price</th>
                <th scope="col">Quantity</th>
                <th scope="col">Action</th>

              </tr>
            </thead>
            <tbody>
              {% for item in items %}
              <tr>
                <td>{{ item.name }}</td>
                <td>₹{{ item.price }}</td>
                <td>
                  <input type="number" name="quantity_{{ item.id }}" class="form-control w-50 mx-auto" min="0"
                    value="0">
                </td>
                <td>
                  <a href="{{ url_for('update_item', id=item.id) }}" class="btn btn-warning btn-sm">
                    ✏ Update Price
                  </a>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>

          <!-- Customer Name -->
          <div class="mb-3">
            <label for="customer_name" class="form-label">Customer Name</label>
            <input type="text" class="form-control w-50" id="customer_name" name="customer_name"
              placeholder="Enter your name" required>
          </div>

          <!-- Place Order Button -->
          <button type="submit" class="btn btn-success btn-order">Place Order</button>
        </form>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
</body>

</html>
