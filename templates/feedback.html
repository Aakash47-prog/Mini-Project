<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
  <link rel="stylesheet" href="sty.css">
  <style>
    /* Popup background overlay */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none; /* hidden by default */
      justify-content: center;
      align-items: center;
    }

    /* Popup box */
    .popup {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      max-width: 350px;
      width: 90%;
      animation: fadeIn 0.3s ease-in-out;
    }

    .popup h3 {
      margin: 0 0 10px;
      color: teal;
    }

    .popup p {
      margin-bottom: 15px;
      color: #333;
    }

    .popup button {
      background: teal;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .popup button:hover {
      background: #005f5f;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container1">
    <h2>Feedback Form</h2>
    <form onsubmit="showPopup(event)">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="message">Feedback:</label>
      <textarea id="message" name="message" rows="4" placeholder="Write your feedback..." required></textarea>

      <button type="submit">Submit</button>
      
      <div class="home">
         <a href="http://127.0.0.1:3000/Mini-Project/templates/home.html" class="order-btn">Home page</a>
      </div>
    </form>
  </div>

  <!-- Popup -->
  <div class="popup-overlay" id="popup">
    <div class="popup">
      <h3>✅ Thank You!</h3>
      <p>Your feedback has been submitted successfully.</p>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    function showPopup(event) {
      event.preventDefault(); // stop form from refreshing
      document.getElementById("popup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }
  </script>
</body>
</html>
