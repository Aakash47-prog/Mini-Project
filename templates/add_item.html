<!DOCTYPE html>
<html>
<head>
<title>Add Item</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#667eea,#764ba2);
font-family: 'Segoe UI', sans-serif;
">

<div style="
width:420px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
padding:35px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
color:white;
">

<h2 style="
text-align:center;
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
">Add New Item</h2>

<form method="POST">

<div style="margin-bottom:18px;">
<label style="font-weight:500; margin-bottom:6px; display:block;">Item Name</label>
<input 
type="text" 
name="name" 
required
style="
width:100%;
padding:10px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.8);
transition:0.3s;
"
onfocus="this.style.background='white'"
onblur="this.style.background='rgba(255,255,255,0.8)'"
>
</div>

<div style="margin-bottom:22px;">
<label style="font-weight:500; margin-bottom:6px; display:block;">Price</label>
<input 
type="number" 
name="price" 
required
style="
width:100%;
padding:10px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.8);
transition:0.3s;
"
onfocus="this.style.background='white'"
onblur="this.style.background='rgba(255,255,255,0.8)'"
>
</div>

<button 
type="submit"
style="
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all 0.3s ease;
"
onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.3)'"
onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'"
>
Add Item
</button>

</form>

</div>

</body>
</html>
