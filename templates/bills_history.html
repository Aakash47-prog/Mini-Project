<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Bills History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">


        <div class="alert alert-success mt-4">

            <h4 class="text-center">Total Sales : ₹ {{ total_sales }}</h4>

            <div class="d-flex justify-content-end">
                <a href="{{ url_for('home') }}" class="btn btn-primary mt-2">
                    ⬅ Back to Home
                </a>
            </div>

        </div>
        <h2 class="text-center mb-4">🧾 Bills History</h2>


        <table class="table table-bordered table-hover text-center shadow">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Order ID</th>
                    <th>Total Amount</th>
                    <th>Generated Time</th>
                </tr>

            </thead>

            <tbody>

                {% for bill in bills %}

                <tr>

                    <td>{{ bill[0] }}</td>
                    <td>{{ bill[1] }}</td>
                    <td>₹{{ bill[2] }}</td>
                    <td>{{ bill[3] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        {% if not bills %}
        <p class="text-danger text-center">No Bills Found</p>
        {% endif %}

    </div>

</body>

</html>
