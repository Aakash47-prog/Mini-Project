<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .payment-card {
      max-width: 450px;
      margin: 60px auto;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
      background: white;
    }
    .btn-pay {
      background: #28a745;
      color: white;
      font-size: 18px;
      padding: 10px;
      border-radius: 8px;
      width: 100%;
      transition: 0.3s;
      border: none;
    }
    .btn-pay:hover {
      background: #218838;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="payment-card">
    <h3 class="text-center text-success">Pay Your Bill</h3>
    <p class="text-center">Total: <strong>₹{{ order.bill.total_amount }}</strong></p>

    <form method="POST" action="/process_payment/{{ order.id }}">
      <div class="mb-3">
        <label class="form-label">Card Number</label>
        <input type="text" class="form-control" name="card_number" placeholder="xxxx-xxxx-xxxx-xxxx" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Card Holder</label>
        <input type="text" class="form-control" name="card_holder" required>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Expiry</label>
          <input type="text" class="form-control" name="expiry" placeholder="MM/YY" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">CVV</label>
          <input type="password" class="form-control" name="cvv" placeholder="***" required>
        </div>
      </div>
      <button type="submit" class="btn-pay">Pay Now</button>
    </form>
  </div>
</body>
</html>
